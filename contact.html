<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Contact Sarah Jennings – Partner at Cashiers Valley Real Estate.">
    <title>Contact Sarah Jennings • Cashiers Valley, NC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;700&display=swap');
        body { font-family: 'Cormorant Garamond', serif; line-height: 1.75; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .nav-link, .logo-name { font-family: 'Cormorant Garamond', serif; font-weight: 700; letter-spacing: 0.5px; }
        
        .hero { 
            background: linear-gradient(rgba(31,44,36,0.72), rgba(31,44,36,0.72)), 
                        url('assets/images/hero/hero-main.jpg') center/cover no-repeat fixed; 
            min-height: 100dvh;
        }
        .gold { color: #D4AF77; }
        
        .hero h1 { font-size: clamp(2.75rem, 8vw + 1rem, 4.5rem); line-height: 1.05; }
        .nav-link { transition: all 0.3s ease; }
        .nav-link:hover { color: #D4AF77; }
        
        .mobile-menu { display: none; position: fixed; inset: 0; background: white; z-index: 9999; padding-top: env(safe-area-inset-top); }
        .mobile-menu.active { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2.5rem; }
        .touch-target { min-height: 48px; }
    </style>
</head>
<body class="bg-[#F8F1E3] text-[#1F2C24]">

    <!-- NAV same green -->
    <nav class="bg-[#1F2C24] text-white fixed w-full z-50">
        <!-- (identical nav code as index.html – omitted here for brevity but copy exactly from index.html) -->
        <!-- ... same nav HTML as above ... -->
    </nav>

    <!-- HERO -->
    <section class="hero flex items-center justify-center text-white pt-20">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h1 class="font-bold leading-none">Let’s Find Your Mountain Home</h1>
            <p class="text-4xl gold tracking-wide">I personally answer every call, text, and email</p>
        </div>
    </section>

    <!-- CONTACT INFO -->
    <section class="max-w-5xl mx-auto px-6 py-24">
        <div class="grid md:grid-cols-2 gap-16 items-center">
            <div>
                <img src="assets/images/headshot/sarah-contact.jpg" alt="Sarah Jennings" class="rounded-3xl shadow-2xl w-full">
            </div>
            <div class="space-y-10">
                <a href="tel:8285534331" class="block text-6xl font-light tracking-widest hover:text-[#D4AF77] transition touch-target">828.553.4331</a>
                <a href="mailto:sarah@cashiersvalley.com" class="block text-3xl hover:text-[#D4AF77] transition">sarah@cashiersvalley.com</a>
                <div class="text-lg opacity-80">404 Highway 107 S<br>Cashiers, NC 28717</div>
                <button onclick="saveToContacts()" class="mt-8 inline-block px-12 py-5 text-lg font-semibold border-2 border-[#1F2C24] bg-white text-[#1F2C24] rounded-2xl hover:bg-[#1F2C24] hover:text-white transition touch-target">
                    Save Sarah Jennings to My Phone
                </button>
            </div>
        </div>
    </section>

    <footer class="bg-white py-12 text-center text-xs text-gray-500 border-t">
        <p>Sarah Jennings • Partner, Cashiers Valley Real Estate • © 2026</p>
        <p class="mt-2">Proudly serving Cashiers, Highlands &amp; the Southern Blue Ridge Mountains</p>
    </footer>

    <script>
        function saveToContacts() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
N:Jennings;Sarah;;;
FN:Sarah Jennings
ORG:Cashiers Valley Real Estate
TITLE:Partner & Co-Founder
TEL;TYPE=CELL:8285534331
EMAIL:sarah@cashiersvalley.com
ADR;TYPE=WORK:;;404 Highway 107 S;Cashiers;NC;28717;USA
URL:https://sarahjenningsre.com
END:VCARD`;
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = 'Sarah-Jennings.vcf';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        hamburger.addEventListener('click', () => mobileMenu.classList.toggle('active'));
    </script>
</body>
</html>
